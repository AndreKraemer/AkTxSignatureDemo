<div class="editor-page">
  <div class="page-header">
    <div class="page-header-content">
      <div class="page-title-group">
        <div class="title-row">
          <button class="file-button" (click)="toggleBackstage()" title="Open file panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
            File
          </button>
          <h1 class="page-title">Document Editor</h1>
          <span class="active-doc-name" *ngIf="activeDocument">{{ activeDocument }}</span>
        </div>
        <p class="page-subtitle">Create and edit documents with full Word-compatible formatting, signature fields, and form fields.</p>
      </div>
      <div class="page-header-badges">
        <span class="badge badge-blue">WYSIWYG</span>
        <span class="badge badge-cyan">WebSocket</span>
      </div>
    </div>
  </div>

  <!-- Backstage panel overlay -->
  <div class="backstage-backdrop" *ngIf="backstageOpen" (click)="closeBackstage()"></div>
  <div class="backstage-panel" [class.open]="backstageOpen">
    <div class="backstage-header">
      <h2 class="backstage-title">Documents</h2>
      <button class="backstage-close" (click)="closeBackstage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="backstage-actions">
      <button class="backstage-action-btn" (click)="newDocument()" [disabled]="!connectionID || loadingDoc">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Document
      </button>
      <button
        class="backstage-action-btn save-btn"
        (click)="saveDocument()"
        [disabled]="!connectionID || !activeDocument || saving">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
    </div>

    <div class="backstage-list">
      <div class="backstage-loading" *ngIf="loading">Loading documents...</div>
      <div class="backstage-empty" *ngIf="!loading && documents.length === 0">No documents found.</div>
      <button
        class="doc-item"
        *ngFor="let doc of documents"
        [class.active]="activeDocument === doc.fileName"
        (click)="loadDocument(doc)"
        [disabled]="!connectionID || loadingDoc === doc.fileName">
        <div class="doc-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div class="doc-info">
          <span class="doc-name">{{ doc.displayName }}</span>
          <span class="doc-meta">{{ doc.extension }} &middot; {{ formatSize(doc.sizeBytes) }}</span>
        </div>
        <span class="doc-loading-indicator" *ngIf="loadingDoc === doc.fileName">Loading...</span>
      </button>
    </div>

    <div class="backstage-footer">
      <span class="connection-status" [class.connected]="connectionID">
        <span class="status-dot"></span>
        {{ connectionID ? 'Connected' : 'Connecting...' }}
      </span>
    </div>
  </div>

  <div class="editor-container">
    <tx-document-editor
      width="100%"
      height="100%"
      [webSocketURL]="webSocketUrl"
      [contextMenusEnabled]="true"
      [tableGridLines]="true"
      [textFieldsEditable]="true">
    </tx-document-editor>
  </div>
</div>
