<div class="sign-page">
  <div class="page-header">
    <div class="page-header-content">
      <div class="page-title-group">
        <h1 class="page-title">Sign Document</h1>
        <p class="page-subtitle">Review and sign documents with electronic signatures. After signing, the PDF is downloaded automatically.</p>
      </div>
      <div class="page-header-badges">
        <span class="badge badge-green">Signatures</span>
        <span class="badge badge-purple">Initials</span>
      </div>
    </div>
    <div class="signer-info">
      <div class="signer-detail">
        <span class="signer-label">Signer</span>
        <span class="signer-value">John Doe</span>
      </div>
      <div class="signer-detail">
        <span class="signer-label">Initials</span>
        <span class="signer-value">JD</span>
      </div>
      <div class="signer-detail">
        <span class="signer-label">Owner</span>
        <span class="signer-value">André Krämer</span>
      </div>
      <div class="signer-detail" *ngIf="activeDocument">
        <span class="signer-label">After signing</span>
        <span class="signer-value redirect-hint">PDF Download + Saved</span>
      </div>
    </div>
    <div class="doc-chips" *ngIf="documents.length > 0">
      <button
        class="doc-chip"
        *ngFor="let doc of documents"
        [class.active]="activeDocument === doc.fileName"
        [class.loading]="loadingDoc === doc.fileName"
        (click)="selectDocument(doc)"
        [disabled]="loadingDoc !== null">
        <span class="chip-ext">{{ doc.extension }}</span>
        {{ doc.displayName }}
      </button>
    </div>
  </div>
  <div class="sign-container">
    <div class="sign-placeholder" *ngIf="!activeDocument">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 19.5c0 .5-.5 1-1 1H5c-.5 0-1-.5-1-1V5c0-.5.5-1 1-1h8l6 6v9.5z"/>
        <path d="M7 17s1.5-2 3-2 2 2 4 2 3-2 3-2"/>
      </svg>
      <p>Select a document above to begin signing.</p>
    </div>
    <tx-document-viewer
      *ngIf="showViewer && activeDocument"
      width="100%"
      height="100%"
      [basePath]="basePath"
      dock="Fill"
      [toolbarDocked]="true"
      [showThumbnailPane]="false"
      [isSelectionActivated]="true"
      [signatureSettings]="signatureSettings"
      [documentData]="documentData">
    </tx-document-viewer>
  </div>
</div>
