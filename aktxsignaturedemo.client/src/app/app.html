<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M12 18c1.5 0 2.5-1.5 2.5-1.5S13.5 15 12 15s-2.5 1.5-2.5 1.5S10.5 18 12 18z"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">AK Signature</span>
          <span class="logo-subtitle">Demo</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="nav-section-label">Navigation</span>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </a>
        <a routerLink="/editor" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span>Document Editor</span>
        </a>
        <a routerLink="/viewer" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span>Document Viewer</span>
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Signatures</span>
        <a routerLink="/sign" routerLinkActive="active" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 19.5c0 .5-.5 1-1 1H5c-.5 0-1-.5-1-1V5c0-.5.5-1 1-1h8l6 6v9.5z"/>
            <path d="M7 17s1.5-2 3-2 2 2 4 2 3-2 3-2"/>
          </svg>
          <span>Sign Document</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-content">
        <span class="version-badge">TX Text Control v34 &middot; .NET Aspire</span>
        <span class="powered-by">by Andr&eacute; Kr&auml;mer</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
